<div class="sidebar h-100 d-flex flex-column">
    <!-- Close button (visible only on small screens) -->
    <button class="btn btn-link text-white text-start d-lg-none mb-0 p-3" (click)="sidebar.toggle()">
        <i class="fas fa-times me-2"></i>Cerrar
    </button>

    <div class="menu px-3 py-2">
        <!-- Ventanilla (reemplaza Inicio) -->
        <div class="menu-group" *ngIf="canAccessPqrs() || canAccessCorrespondencia()">
            <div class="menu-title clickable" (click)="toggleMenu('ventanilla')">
                <i class="fas fa-home me-2"></i>VENTANILLA
                <i class="fas fa-chevron-down ms-auto chevron" [class.rotated]="menuStates.ventanilla"></i>
            </div>
            <ul class="list-unstyled ms-1 submenu" [class.expanded]="menuStates.ventanilla">
                <li *ngIf="canAccessPqrs()">
                    <a class="menu-link" [class.active]="isActiveView('dashboard') || isActiveView('mis-pqrs')" (click)="goDashboard('dashboard')">
                        <i class="fas fa-inbox me-2"></i>PQRS
                    </a>
                </li>
                <li *ngIf="canAccessCorrespondencia()">
                    <a class="menu-link" [class.active]="isActiveView('correspondencia')" (click)="goDashboard('correspondencia')">
                        <i class="fas fa-envelope me-2"></i>Correspondencia
                    </a>
                </li>
            </ul>
        </div>

        <!-- Planes -->
        <div class="menu-group" *ngIf="canAccessPlanes() || canAccessPdm()">
            <div class="menu-title clickable" (click)="toggleMenu('planes')">
                <i class="fas fa-clipboard-list me-2"></i>PLANES
                <i class="fas fa-chevron-down ms-auto chevron" [class.rotated]="menuStates.planes"></i>
            </div>
            <ul class="list-unstyled ms-1 submenu" [class.expanded]="menuStates.planes">
                <!-- Planes Institucionales -->
                <li *ngIf="canAccessPlanes()">
                    <a class="menu-link" (click)="goPlanes()">
                        <i class="fas fa-angle-right me-2"></i>Planes Institucionales
                    </a>
                </li>
                
                <!-- PDM con submenu -->
                <li *ngIf="canAccessPdm()" class="submenu-nested">
                    <div class="menu-link clickable" (click)="toggleMenu('pdm'); $event.stopPropagation()">
                        <i class="fas fa-angle-right me-2"></i>PDM
                        <i class="fas fa-chevron-down ms-auto chevron-small" [class.rotated]="menuStates.pdm"></i>
                    </div>
                    <ul class="list-unstyled ms-3 submenu-level-2" [class.expanded]="menuStates.pdm">
                        <li>
                            <a class="menu-link menu-link-nested" (click)="goPdmUpload()">
                                <i class="fas fa-circle me-2" style="font-size: 0.4rem;"></i>Ingresar
                            </a>
                        </li>
                        <li *ngIf="isAdmin()">
                            <a class="menu-link menu-link-nested" (click)="openCargarEjecucion()">
                                <i class="fas fa-circle me-2" style="font-size: 0.4rem;"></i>Cargar Ejecución
                            </a>
                        </li>
                        <li *ngIf="isAdmin()">
                            <a class="menu-link menu-link-nested" (click)="openCargarNuevoArchivo()">
                                <i class="fas fa-circle me-2" style="font-size: 0.4rem;"></i>Cargar Archivo
                            </a>
                        </li>
                    </ul>
                </li>
            </ul>
        </div>

        <!-- Contrataciones -->
        <div class="menu-group" *ngIf="canAccessContratacion()">
            <div class="menu-title clickable" (click)="toggleMenu('contratacion')">
                <i class="fas fa-file-contract me-2"></i>CONTRATACIONES
                <i class="fas fa-chevron-down ms-auto chevron" [class.rotated]="menuStates.contratacion"></i>
            </div>
            <ul class="list-unstyled ms-1 submenu" [class.expanded]="menuStates.contratacion">
                <li>
                    <a class="menu-link" [class.active]="isActiveRouteContratacion('secop2')" (click)="goContratacion('secop2')">
                        <i class="fas fa-angle-right me-2"></i>SECOP II
                    </a>
                </li>
                <li>
                    <a class="menu-link" [class.active]="isActiveRouteContratacion('secop1')" (click)="goContratacion('secop1')">
                        <i class="fas fa-angle-right me-2"></i>SECOP I
                    </a>
                </li>
            </ul>
        </div>

        <!-- Presupuesto (antes Solicitudes) -->
        <div class="menu-group" *ngIf="canAccessPresupuesto()">
            <div class="menu-title clickable" (click)="toggleMenu('presupuesto')">
                <i class="fas fa-coins me-2"></i>PRESUPUESTO
                <i class="fas fa-chevron-down ms-auto chevron" [class.rotated]="menuStates.presupuesto"></i>
            </div>
            <ul class="list-unstyled ms-1 submenu" [class.expanded]="menuStates.presupuesto">
                <li>
                    <a class="menu-link" [class.active]="isActiveRouteSolicitudCDP()" (click)="goSolicitudCDP()">
                        <i class="fas fa-angle-right me-2"></i>CDP
                    </a>
                </li>
                <li>
                    <a class="menu-link" [class.active]="isActiveRouteCertificacionBPP()" (click)="goCertificacionBPP()">
                        <i class="fas fa-angle-right me-2"></i>Certificación de BPP
                    </a>
                </li>
            </ul>
        </div>
    </div>
</div>
