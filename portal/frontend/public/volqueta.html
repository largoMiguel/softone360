<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="theme-color" content="#e65100" />
  <title>Registro Volqueta</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #fff3e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      background: #e65100;
      color: white;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    header .icon { font-size: 28px; }
    header h1 { font-size: 18px; font-weight: 700; }
    header p { font-size: 12px; opacity: 0.85; margin-top: 2px; }
    .badge-pendiente {
      margin-left: auto;
      background: white;
      color: #e65100;
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 13px;
      font-weight: 700;
      display: none;
    }
    main { flex: 1; padding: 20px; max-width: 480px; width: 100%; margin: 0 auto; }
    .card {
      background: white;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      margin-bottom: 16px;
    }
    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #555;
      margin-bottom: 6px;
      margin-top: 14px;
    }
    label:first-child { margin-top: 0; }
    input, select, textarea {
      width: 100%;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 16px;
      transition: border-color 0.2s;
      background: #fafafa;
    }
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: #e65100;
      background: white;
    }
    textarea { resize: none; height: 80px; }
    .gps-box {
      background: #fff3e0;
      border: 2px solid #ffcc80;
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 14px;
      color: #555;
      min-height: 48px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .gps-box.ok { background: #e8f5e9; border-color: #a5d6a7; color: #2e7d32; }
    .gps-box.error { background: #ffebee; border-color: #ef9a9a; color: #c62828; }
    .btn-main {
      width: 100%;
      padding: 18px;
      background: #e65100;
      color: white;
      border: none;
      border-radius: 14px;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-top: 8px;
    }
    .btn-main:active { transform: scale(0.97); }
    .btn-main:disabled { background: #ccc; cursor: not-allowed; }
    .btn-sync {
      width: 100%;
      padding: 14px;
      background: white;
      color: #e65100;
      border: 2px solid #e65100;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-sync:hover { background: #fff3e0; }
    .estado-sync {
      text-align: center;
      font-size: 13px;
      color: #777;
      margin-top: 10px;
      min-height: 20px;
    }
    .estado-sync.ok { color: #2e7d32; font-weight: 600; }
    .estado-sync.error { color: #c62828; }
    .indicador-conexion {
      text-align: center;
      padding: 8px;
      font-size: 13px;
      font-weight: 600;
      border-radius: 8px;
      margin-bottom: 12px;
    }
    .indicador-conexion.online { background: #e8f5e9; color: #2e7d32; }
    .indicador-conexion.offline { background: #ffebee; color: #c62828; }
    .historial-item {
      border-bottom: 1px solid #f0f0f0;
      padding: 10px 0;
      font-size: 13px;
      color: #555;
    }
    .historial-item:last-child { border-bottom: none; }
    .historial-item .hora { font-weight: 700; color: #e65100; }
    .historial-item .pendiente { color: #f57c00; font-style: italic; }
    .section-title {
      font-size: 15px;
      font-weight: 700;
      color: #333;
      margin-bottom: 14px;
    }
    @media (max-width: 400px) {
      main { padding: 14px; }
      .card { padding: 16px; }
    }
  </style>
</head>
<body>

<header>
  <div class="icon">🚛</div>
  <div>
    <h1>Registro de Descarga</h1>
    <p>Volqueta — Alcaldía Municipal</p>
  </div>
  <div class="badge-pendiente" id="badgePendiente">0 pendientes</div>
</header>

<main>
  <div class="indicador-conexion offline" id="indicadorConexion">● Sin conexión</div>

  <div class="card">
    <div class="section-title">📍 Datos del viaje</div>

    <label>Conductor *</label>
    <input type="text" id="conductor" placeholder="Su nombre completo" autocomplete="name" />

    <label>Placa del vehículo *</label>
    <input type="text" id="placa" placeholder="Ej: ABC123" autocomplete="off"
           style="text-transform:uppercase" oninput="this.value=this.value.toUpperCase()" />

    <label>Material transportado</label>
    <select id="material">
      <option value="">— Seleccione —</option>
      <option>Rajón</option>
      <option>Recebo</option>
      <option>Arena</option>
      <option>Gravilla</option>
      <option>Asfalto</option>
      <option>Concreto</option>
      <option>Otro</option>
    </select>

    <label>Observación (opcional)</label>
    <textarea id="observacion" placeholder="Vía, sector, cantidad..."></textarea>

    <label>Ubicación GPS *</label>
    <div class="gps-box" id="gpsBox">
      <span>⏳</span> <span id="gpsTexto">Obteniendo ubicación...</span>
    </div>
  </div>

  <button class="btn-main" id="btnRegistrar" disabled>
    <span>📌</span> Registrar descarga
  </button>

  <div class="card" style="margin-top:16px">
    <button class="btn-sync" id="btnSync">🔄 Sincronizar pendientes</button>
    <div class="estado-sync" id="estadoSync"></div>
  </div>

  <div class="card" id="cardHistorial" style="display:none">
    <div class="section-title">📋 Registros recientes</div>
    <div id="historialLista"></div>
  </div>
</main>

<script>
  // ── Configuración ──────────────────────────────────────────────
  const params = new URLSearchParams(location.search);
  const ENTITY_SLUG = params.get('entity') || '';
  const API_BASE = location.origin.includes('localhost')
    ? 'http://localhost:8000/api'
    : '/api';
  const STORAGE_KEY = 'vias_viajes_pendientes_' + ENTITY_SLUG;
  const HIST_KEY    = 'vias_viajes_historial_' + ENTITY_SLUG;

  // ── Estado GPS ─────────────────────────────────────────────────
  let gpsActual = null;

  function actualizarGPS() {
    if (!navigator.geolocation) {
      setGPS(null, 'GPS no disponible en este dispositivo');
      return;
    }
    navigator.geolocation.getCurrentPosition(
      pos => setGPS({ lat: pos.coords.latitude, lng: pos.coords.longitude }, null),
      err => setGPS(null, 'No se pudo obtener ubicación: ' + err.message),
      { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
    );
  }

  function setGPS(coords, error) {
    const box = document.getElementById('gpsBox');
    const txt = document.getElementById('gpsTexto');
    if (coords) {
      gpsActual = coords;
      box.className = 'gps-box ok';
      txt.textContent = `✓ ${coords.lat.toFixed(5)}, ${coords.lng.toFixed(5)}`;
      document.getElementById('btnRegistrar').disabled = false;
    } else {
      gpsActual = null;
      box.className = 'gps-box error';
      txt.textContent = error || 'GPS no disponible';
      document.getElementById('btnRegistrar').disabled = true;
    }
  }

  // Actualiza GPS al entrar y cada 30 s
  actualizarGPS();
  setInterval(actualizarGPS, 30000);

  // ── Cola offline ───────────────────────────────────────────────
  function getPendientes() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); }
    catch { return []; }
  }
  function setPendientes(arr) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(arr));
    actualizarBadge();
  }
  function actualizarBadge() {
    const n = getPendientes().length;
    const b = document.getElementById('badgePendiente');
    b.style.display = n > 0 ? 'block' : 'none';
    b.textContent = n + (n === 1 ? ' pendiente' : ' pendientes');
  }

  // ── Historial local ────────────────────────────────────────────
  function getHistorial() {
    try { return JSON.parse(localStorage.getItem(HIST_KEY) || '[]'); }
    catch { return []; }
  }
  function addHistorial(item) {
    const h = getHistorial();
    h.unshift(item);
    if (h.length > 20) h.pop();
    localStorage.setItem(HIST_KEY, JSON.stringify(h));
    renderHistorial();
  }
  function renderHistorial() {
    const h = getHistorial();
    const card = document.getElementById('cardHistorial');
    const lista = document.getElementById('historialLista');
    if (h.length === 0) { card.style.display = 'none'; return; }
    card.style.display = 'block';
    lista.innerHTML = h.slice(0, 10).map(item => {
      const hora = new Date(item.timestamp).toLocaleTimeString('es-CO', { hour: '2-digit', minute: '2-digit' });
      const fecha = new Date(item.timestamp).toLocaleDateString('es-CO');
      const estado = item.enviado
        ? ''
        : '<span class="pendiente">⏳ pendiente de envío</span>';
      return `<div class="historial-item">
        <span class="hora">${hora}</span> · ${fecha}<br>
        ${item.conductor} · ${item.placa}<br>
        ${item.material || ''}
        ${estado}
      </div>`;
    }).join('');
  }

  // ── Registrar viaje ────────────────────────────────────────────
  document.getElementById('btnRegistrar').addEventListener('click', async () => {
    const conductor = document.getElementById('conductor').value.trim();
    const placa     = document.getElementById('placa').value.trim();
    const material  = document.getElementById('material').value;
    const obs       = document.getElementById('observacion').value.trim();

    if (!conductor) { alert('Ingrese su nombre'); return; }
    if (!placa)     { alert('Ingrese la placa del vehículo'); return; }
    if (!gpsActual) { alert('Esperando GPS, intente de nuevo'); actualizarGPS(); return; }
    if (!ENTITY_SLUG) { alert('URL inválida: falta parámetro ?entity='); return; }

    const registro = {
      entity_slug: ENTITY_SLUG,
      conductor_nombre: conductor,
      placa_vehiculo: placa,
      tipo_material: material || null,
      observacion: obs || null,
      latitud: gpsActual.lat,
      longitud: gpsActual.lng,
      timestamp_registro: new Date().toISOString(),
    };

    const histItem = {
      timestamp: registro.timestamp_registro,
      conductor, placa,
      material,
      enviado: false,
    };

    const btn = document.getElementById('btnRegistrar');
    btn.disabled = true;
    btn.innerHTML = '<span>⏳</span> Guardando...';

    if (navigator.onLine) {
      try {
        const res = await fetch(`${API_BASE}/vias/viajes`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(registro),
        });
        if (res.ok) {
          histItem.enviado = true;
          addHistorial(histItem);
          mostrarEstado('estadoSync', '✓ Registrado correctamente', 'ok');
          limpiarFormulario();
        } else {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.detail || res.statusText);
        }
      } catch (e) {
        guardarPendiente(registro);
        addHistorial(histItem);
        mostrarEstado('estadoSync', '⚠️ Sin conexión — guardado para sincronizar', '');
        limpiarFormulario();
      }
    } else {
      guardarPendiente(registro);
      addHistorial(histItem);
      mostrarEstado('estadoSync', '📴 Sin señal — se enviará automáticamente al conectarse', '');
      limpiarFormulario();
    }

    btn.disabled = false;
    btn.innerHTML = '<span>📌</span> Registrar descarga';
  });

  function guardarPendiente(r) {
    const p = getPendientes();
    p.push(r);
    setPendientes(p);
  }

  function limpiarFormulario() {
    document.getElementById('observacion').value = '';
    actualizarGPS();
  }

  // ── Sincronización manual ──────────────────────────────────────
  document.getElementById('btnSync').addEventListener('click', sincronizar);

  async function sincronizar() {
    const pendientes = getPendientes();
    if (pendientes.length === 0) {
      mostrarEstado('estadoSync', 'Sin registros pendientes', '');
      return;
    }
    if (!navigator.onLine) {
      mostrarEstado('estadoSync', '📴 No hay conexión', 'error');
      return;
    }

    const btn = document.getElementById('btnSync');
    btn.disabled = true;
    btn.textContent = '⏳ Sincronizando...';

    try {
      const res = await fetch(`${API_BASE}/vias/viajes/batch`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ viajes: pendientes }),
      });
      if (res.ok) {
        const data = await res.json();
        // Marcar como enviados en el historial
        const hist = getHistorial().map(h => ({ ...h, enviado: true }));
        localStorage.setItem(HIST_KEY, JSON.stringify(hist));
        renderHistorial();
        setPendientes([]);
        mostrarEstado('estadoSync', `✓ ${data.guardados} registros sincronizados`, 'ok');
      } else {
        throw new Error('Error del servidor');
      }
    } catch (e) {
      mostrarEstado('estadoSync', '⚠️ Error al sincronizar, intente de nuevo', 'error');
    }

    btn.disabled = false;
    btn.textContent = '🔄 Sincronizar pendientes';
  }

  // Sincronización automática al recuperar conexión
  window.addEventListener('online', () => {
    actualizarIndicadorConexion();
    if (getPendientes().length > 0) sincronizar();
  });
  window.addEventListener('offline', actualizarIndicadorConexion);

  function actualizarIndicadorConexion() {
    const el = document.getElementById('indicadorConexion');
    if (navigator.onLine) {
      el.className = 'indicador-conexion online';
      el.textContent = '● Conectado';
    } else {
      el.className = 'indicador-conexion offline';
      el.textContent = '● Sin conexión — los registros se guardan en el celular';
    }
  }

  function mostrarEstado(id, msg, tipo) {
    const el = document.getElementById(id);
    el.textContent = msg;
    el.className = 'estado-sync ' + tipo;
    setTimeout(() => { el.textContent = ''; el.className = 'estado-sync'; }, 5000);
  }

  // ── Inicio ─────────────────────────────────────────────────────
  actualizarIndicadorConexion();
  actualizarBadge();
  renderHistorial();

  if (!ENTITY_SLUG) {
    document.querySelector('main').innerHTML =
      '<div class="card" style="color:#c62828;text-align:center;padding:30px">' +
      '<p style="font-size:18px">⚠️ URL inválida</p>' +
      '<p style="margin-top:8px">Escanee el código QR del vehículo</p></div>';
  }
</script>
</body>
</html>
